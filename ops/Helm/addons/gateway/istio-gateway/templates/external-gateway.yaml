apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: external-gateway
  annotations:
    cert-manager.io/cluster-issuer: cert-manager-production
    # No cilium.io/lb-ipam-ips: with gatewayAPI.hostNetwork and a single public IP equal to the
    # node IP, LB IPAM/L2 on that address breaks reachability; traffic hits the node ports directly.
spec:
  gatewayClassName: istio
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All

    - name: https
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: external-gateway-cert
            kind: Secret
      allowedRoutes:
        namespaces:
          from: All
