apiVersion: v2
appVersion: "1.31.0"
name: cassandra-operator
version: 1.0.0
kubeVersion: ">= 1.30.0 || >= v1.30.0-0"
keywords:
  - cassandra
  - k8ssandra
  - operator
maintainers:
  - email: batazor111@gmail.com
    name: batazor
    url: batazor.ru
type: application
deprecated: false
dependencies:
  # Do not use alias: k8ssandra-operator CRD hook passes .Chart.Name to --chartName; alias would
  # break the PreSync Job (client looks for a chart named like the alias, not k8ssandra-operator).
  - name: k8ssandra-operator
    version: 1.31.0
    repository: https://helm.k8ssandra.io/stable
    condition: k8ssandra-operator.enabled
    tags:
      - cassandra
      - store
