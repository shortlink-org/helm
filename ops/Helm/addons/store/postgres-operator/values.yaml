# Common default values for postgres-operator.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

pgo:
  enabled: true

  env:
    - name: PGO_FEATURE_GATES
      value: 'AutoGrowVolumes=true,AppendCustomQueries=true'

  resources:
    controller:
      limits:
        cpu: "1"
        memory: 512Mi
      requests:
        cpu: 200m
        memory: 128Mi
