{{/* vim: set filetype=mustache: */}}

{{- define "shortlink-common.ServiceMonitor" -}}
{{- if and .Values.monitoring .Values.monitoring.enabled }}
{{- $serviceMonitorPort := .Values.monitoring.port | default "metrics" -}}
{{- range .Values.service.ports -}}
  {{- if and .public (eq $serviceMonitorPort "") -}}
    {{- $serviceMonitorPort = .name -}}
  {{- end -}}
  {{- if and .public (eq .name "metrics") -}}
    {{- $serviceMonitorPort = "metrics" -}}
  {{- end -}}
{{- end -}}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .name | default (include "helpers.fullname" .) }}
  labels:
    release: prometheus-operator
    {{- with .Values.commonLabels }}
      {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}
    {{- end }}
    {{- include "helpers.labels" . | nindent 4 }}
    {{- with .Values.monitoring.labels }}
      {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}
    {{- end }}
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
  {{- end }}
spec:
  selector:
    matchLabels: {{- include "common.labels.matchLabels" . | nindent 6 }}
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  endpoints:
    - port: {{ $serviceMonitorPort }}
  targetLabels:
    - app.kubernetes.io/name
    - helm.sh/chart
{{- end }}
{{- end }}
