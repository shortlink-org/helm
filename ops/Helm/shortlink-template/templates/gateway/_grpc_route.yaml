{{/* vim: set filetype=mustache: */}}

{{/*
  shortlink-common.grpc_route
  ---------------------------
  Renders gateway.networking.k8s.io/v1 GRPCRoute when .Values.grpcRoute.enabled.

  parentRefs
  ----------
  - If grpcRoute.parentRefs is unset: one ref from gatewayName / gatewayNamespace
    (defaults: internal-gateway, istio-system).
  - Every ref is merged with group: gateway.networking.k8s.io, kind: Gateway.

  backendRefs (generated refs only; see rules caveat below)
  ------------------------------------------------------------
  - Always include group: "" and kind: Service on refs this template builds.
  - Single backend: name from grpcRoute.backendRefName or helpers.fullname; port from
    grpcRoute.port or first public service.ports[].port (else 50051). Default weight 1
    unless grpcRoute.backendRefWeight is set.
  - Rollout + Canary: stable weight 100, <fullname>-preview weight 0; Argo adjusts weights.
  - grpcRoute.backendRefs: each entry merged with Service defaults + default weight;
    values fields override.
  - Optional grpcRoute.backendRefNamespace on generated refs.

  rules (default path)
  --------------------
  - If grpcRoute.rules is unset: one rule with gRPC method matches from grpcRoute.methods
    (list) or grpcRoute.method (single Exact), and backendRefs from above.
  - If grpcRoute.rules is set: emitted as-is — no merging inside your rules YAML.

  Other: grpcRoute.hostnames; default backend port discovery uses service.ports (public).

  Ref: https://rollouts-plugin-trafficrouter-gatewayapi.readthedocs.io/
*/}}

{{- define "shortlink-common.grpc_route" }}
{{- if .Values.grpcRoute.enabled }}
{{- $ := . }}

{{/* Compute default backend port: first public service port */}}
{{- $backend := dict }}
{{- range .Values.service.ports }}
  {{- if and .public (not (hasKey $backend "port")) }}
    {{- $_ := set $backend "port" .port }}
  {{- end }}
{{- end }}
{{- $defaultBackendPort := (index $backend "port" | default 50051) }}

{{- $parentRefDefaults := dict "group" "gateway.networking.k8s.io" "kind" "Gateway" -}}
{{- $defaultParentRef := mergeOverwrite $parentRefDefaults (dict
  "name" (.Values.grpcRoute.gatewayName | default "internal-gateway")
  "namespace" (.Values.grpcRoute.gatewayNamespace | default "istio-system")
) -}}
{{- $parentRefs := list -}}
{{- if .Values.grpcRoute.parentRefs -}}
  {{- range .Values.grpcRoute.parentRefs -}}
    {{- $parentRefs = append $parentRefs (mergeOverwrite $parentRefDefaults .) -}}
  {{- end -}}
{{- else -}}
  {{- $parentRefs = list $defaultParentRef -}}
{{- end -}}

{{- $serviceName := (.Values.grpcRoute.backendRefName | default (include "helpers.fullname" .)) }}
{{- $servicePort := (.Values.grpcRoute.port | default $defaultBackendPort) }}
{{- $backendRefSvcDefaults := dict "group" "" "kind" "Service" -}}
{{- $defaultBackendWeight := .Values.grpcRoute.backendRefWeight | default 1 -}}

{{- /* Check if using Rollout with Canary strategy */ -}}
{{- $isCanary := and (eq (.Values.deploy.type | default "Deployment") "Rollout") (eq (.Values.deploy.strategy.type | default "") "Canary") -}}

{{- /* Build backendRefs based on deployment type */ -}}
{{- $backendRefs := list -}}
{{- if .Values.grpcRoute.backendRefs -}}
  {{- range .Values.grpcRoute.backendRefs -}}
    {{- $backendRefs = append $backendRefs (mergeOverwrite (mergeOverwrite $backendRefSvcDefaults (dict "weight" $defaultBackendWeight)) .) -}}
  {{- end -}}
{{- else if $isCanary -}}
  {{- /* For Canary: stable (100%) and canary (0%) services */ -}}
  {{- $stableRef := mergeOverwrite (mergeOverwrite $backendRefSvcDefaults (dict "weight" 100)) (dict "name" $serviceName "port" $servicePort) -}}
  {{- $canaryRef := mergeOverwrite (mergeOverwrite $backendRefSvcDefaults (dict "weight" 0)) (dict "name" (printf "%s-preview" $serviceName) "port" $servicePort) -}}
  {{- with .Values.grpcRoute.backendRefNamespace -}}
    {{- $_ := set $stableRef "namespace" . -}}
    {{- $_ := set $canaryRef "namespace" . -}}
  {{- end -}}
  {{- $backendRefs = list $stableRef $canaryRef -}}
{{- else -}}
  {{- /* For regular deployment: single backend */ -}}
  {{- $ref := mergeOverwrite (mergeOverwrite $backendRefSvcDefaults (dict "weight" $defaultBackendWeight)) (dict "name" $serviceName "port" $servicePort) -}}
  {{- with .Values.grpcRoute.backendRefNamespace -}}
    {{- $_ := set $ref "namespace" . -}}
  {{- end -}}
  {{- $backendRefs = list $ref -}}
{{- end -}}

---
apiVersion: gateway.networking.k8s.io/v1
kind: GRPCRoute
metadata:
  {{- include "shortlink-common.metadata" . | nindent 2 }}
spec:
  parentRefs:
    {{- toYaml $parentRefs | nindent 4 }}

  {{- with .Values.grpcRoute.hostnames }}
  hostnames:
    {{- range . }}
    - {{ . | quote }}
    {{- end }}
  {{- end }}

  {{- if .Values.grpcRoute.rules }}
  rules:
    {{- toYaml .Values.grpcRoute.rules | nindent 4 }}
  {{- else }}
  rules:
    - matches:
        {{- if .Values.grpcRoute.methods }}
        {{- range .Values.grpcRoute.methods }}
        - method:
            type: Exact
            service: {{ . | quote }}
        {{- end }}
        {{- else if .Values.grpcRoute.method }}
        - method:
            type: Exact
            service: {{ .Values.grpcRoute.method | quote }}
        {{- end }}
      backendRefs:
        {{- toYaml $backendRefs | nindent 8 }}
  {{- end }}
{{- end }}
{{- end }}
