{{/* vim: set filetype=mustache: */}}

{{/*
  shortlink-common.http_route
  ---------------------------
  Gateway API HTTPRoute (gateway.networking.k8s.io/v1). Renders when httpRoute.enabled.

  parentRefs
  ----------
  - If httpRoute.parentRefs is unset: one ref from gatewayName / gatewayNamespace
    (defaults: external-gateway, istio-ingress).
  - Every ref (default or from values) is merged with group gateway.networking.k8s.io
    and kind Gateway so list items need only name/namespace plus any optional fields.

  backendRefs (only for refs this template builds; see rules below)
  ------------------------------------------------------------------
  - Each generated ref includes group: "" and kind: Service.
  - Single service: name from httpRoute.backendRefName or helpers.fullname; port from
    httpRoute.port or first public service.ports[].port (see loop above, else 80).
    weight defaults to 1; set httpRoute.backendRefWeight for a different default.
  - deploy.type Rollout + deploy.strategy.type Canary: two refs — stable weight 100,
    <fullname>-preview weight 0 (plugin adjusts traffic). Same Service group/kind on both.
  - If httpRoute.backendRefs is set: merge each entry with Service defaults + default weight;
    keys in values override (per-ref weight, name, port, namespace, …).
  - httpRoute.backendRefNamespace adds namespace to generated refs when set.

  rules / matches
  ---------------
  - If httpRoute.rules is unset: one rule with PathPrefix matches from httpRoute.paths or
    httpRoute.path (default "/"), and backendRefs from above.
  - If httpRoute.rules is set: value replaces spec.rules entirely (toYaml); no merging
    inside that YAML — supply full Gateway API shapes.

  Optional: httpRoute.hostnames.

  Ref: https://rollouts-plugin-trafficrouter-gatewayapi.readthedocs.io/
*/}}

{{- define "shortlink-common.http_route" -}}
{{- if .Values.httpRoute.enabled -}}

{{- $backendPort := 80 -}}
{{- $portFound := false -}}
{{- range .Values.service.ports -}}
  {{- if and .public (not $portFound) -}}
    {{- $backendPort = .port -}}
    {{- $portFound = true -}}
  {{- end -}}
{{- end -}}

{{- $parentRefDefaults := dict "group" "gateway.networking.k8s.io" "kind" "Gateway" -}}
{{- $defaultParentRef := mergeOverwrite $parentRefDefaults (dict
  "name" (.Values.httpRoute.gatewayName | default "external-gateway")
  "namespace" (.Values.httpRoute.gatewayNamespace | default "istio-ingress")
) -}}
{{- $parentRefs := list -}}
{{- if .Values.httpRoute.parentRefs -}}
  {{- range .Values.httpRoute.parentRefs -}}
    {{- $parentRefs = append $parentRefs (mergeOverwrite $parentRefDefaults .) -}}
  {{- end -}}
{{- else -}}
  {{- $parentRefs = list $defaultParentRef -}}
{{- end -}}

{{- $matches := list -}}
{{- if .Values.httpRoute.paths -}}
  {{- range .Values.httpRoute.paths -}}
    {{- $matches = append $matches (dict "path" (dict "type" "PathPrefix" "value" .)) -}}
  {{- end -}}
{{- else -}}
  {{- $matches = list (dict "path" (dict "type" "PathPrefix" "value" (.Values.httpRoute.path | default "/"))) -}}
{{- end -}}

{{- $serviceName := (.Values.httpRoute.backendRefName | default (include "helpers.fullname" .)) -}}
{{- $servicePort := (.Values.httpRoute.port | default $backendPort) -}}
{{- $backendRefSvcDefaults := dict "group" "" "kind" "Service" -}}
{{- $defaultBackendWeight := .Values.httpRoute.backendRefWeight | default 1 -}}

{{- /* Check if using Rollout with Canary strategy */ -}}
{{- $isCanary := and (eq (.Values.deploy.type | default "Deployment") "Rollout") (eq (.Values.deploy.strategy.type | default "") "Canary") -}}

{{- /* Build backendRefs based on deployment type */ -}}
{{- $backendRefs := list -}}
{{- if .Values.httpRoute.backendRefs -}}
  {{- range .Values.httpRoute.backendRefs -}}
    {{- $backendRefs = append $backendRefs (mergeOverwrite (mergeOverwrite $backendRefSvcDefaults (dict "weight" $defaultBackendWeight)) .) -}}
  {{- end -}}
{{- else if $isCanary -}}
  {{- /* For Canary: stable (100%) and canary (0%) services */ -}}
  {{- $stableRef := mergeOverwrite (mergeOverwrite $backendRefSvcDefaults (dict "weight" 100)) (dict "name" $serviceName "port" $servicePort) -}}
  {{- $canaryRef := mergeOverwrite (mergeOverwrite $backendRefSvcDefaults (dict "weight" 0)) (dict "name" (printf "%s-preview" $serviceName) "port" $servicePort) -}}
  {{- with .Values.httpRoute.backendRefNamespace -}}
    {{- $_ := set $stableRef "namespace" . -}}
    {{- $_ := set $canaryRef "namespace" . -}}
  {{- end -}}
  {{- $backendRefs = list $stableRef $canaryRef -}}
{{- else -}}
  {{- /* For regular deployment: single backend */ -}}
  {{- $ref := mergeOverwrite (mergeOverwrite $backendRefSvcDefaults (dict "weight" $defaultBackendWeight)) (dict "name" $serviceName "port" $servicePort) -}}
  {{- with .Values.httpRoute.backendRefNamespace -}}
    {{- $_ := set $ref "namespace" . -}}
  {{- end -}}
  {{- $backendRefs = list $ref -}}
{{- end -}}

{{- $rules := .Values.httpRoute.rules | default (list (dict "matches" $matches "backendRefs" $backendRefs)) -}}

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  {{- include "shortlink-common.metadata" . | nindent 2 }}
spec:
  parentRefs:
    {{- toYaml $parentRefs | nindent 4 }}

  {{- with .Values.httpRoute.hostnames }}
  hostnames:
    {{- range . }}
    - {{ . | quote }}
    {{- end }}
  {{- end }}

  rules:
    {{- toYaml $rules | nindent 4 }}
{{- end -}}
{{- end -}}
